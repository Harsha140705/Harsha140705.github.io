    <!-- Google Fonts -->

    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #ec4899;
            --bg-dark: #0f172a;
            --text-light: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background Blobs */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        .blob-1 { top: -100px; left: -100px; animation-delay: 0s; }
        .blob-2 { bottom: -100px; right: -100px; background: linear-gradient(135deg, var(--secondary), var(--accent)); animation-delay: -5s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 100px) scale(1.2); }
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 2rem;
            z-index: 1;
        }

        .profile-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            padding: 2.5rem 1.5rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin-bottom: 1.5rem;
            border: 3px solid var(--primary);
            padding: 5px;
            background: var(--bg-dark);
            display: inline-block;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        .profile-img i {
            font-size: 3.5rem;
            line-height: 100px;
            color: var(--primary);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            text-decoration: none;
            color: var(--text-light);
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.2);
        }

        .link-btn i {
            font-size: 1.2rem;
            width: 24px;
            text-align: center;
        }

        .link-btn span {
            flex-grow: 1;
            text-align: center;
            margin-left: -24px; /* Offset the icon width to center text */
        }

        .link-btn .arrow {
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .link-btn:hover .arrow {
            opacity: 1;
            transform: translateX(0);
        }

        /* Specific link colors on hover */
        .link-github:hover { border-color: #333; }
        .link-linkedin:hover { border-color: #0077b5; }
        .link-portfolio:hover { border-color: #10b981; }
        .link-leetcode:hover { border-color: #ffa116; }
        .link-codechef:hover { border-color: #5b4638; }

        .social-footer {
            margin-top: 2.5rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .social-icon {
            color: #94a3b8;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }

        .social-icon:hover {
            color: var(--primary);
            transform: scale(1.2);
        }

        /* Tooltip */
        [data-tooltip] {
            position: relative;
        }

        /* Footer Credits */
        .footer-text {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #475569;
            text-align: center;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 1rem;
            }
            .profile-card {
                padding: 2rem 1rem;
            }
        }
    </style>
</head>

    <script>
        // Subtle hover interaction for the card
        const card = document.querySelector('.profile-card');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            card.style.transform = 'rotateY(0deg) rotateX(0deg)';
            card.style.transition = 'all 0.5s ease';
        });

        document.addEventListener('mouseenter', () => {
            card.style.transition = 'none';
        });
    </script>
